name: Stale Issues

on:
  schedule:
    - cron: '0 0 * * *'

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    uses: LUSKTECH/.github/.github/workflows/reusable-stale.yml@main
    with:
      days_before_stale: 30
      days_before_close: 7
      exempt_labels: 'pinned,security'
