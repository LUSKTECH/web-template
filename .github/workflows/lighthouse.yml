name: Lighthouse CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-secrets:
    name: Check Secrets
    runs-on: ubuntu-latest
    outputs:
      has-lhci: ${{ steps.lhci-check.outputs.defined }}
    steps:
      - name: Check LHCI_GITHUB_APP_TOKEN
        id: lhci-check
        shell: bash
        run: |
          if [ "${{ secrets.LHCI_GITHUB_APP_TOKEN }}" != '' ]; then
            echo "defined=true" >> $GITHUB_OUTPUT
          else
            echo "defined=false" >> $GITHUB_OUTPUT
          fi

  lighthouse:
    name: Lighthouse CI
    needs: [check-secrets]
    if: needs.check-secrets.outputs.has-lhci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc.js
          uploadArtifacts: true
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  lighthouse-skip-notice:
    name: Lighthouse Skip Notice
    needs: [check-secrets]
    if: needs.check-secrets.outputs.has-lhci != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "::notice::Lighthouse CI skipped — LHCI_GITHUB_APP_TOKEN secret is not configured."
