name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-secrets:
    name: Check Secrets
    runs-on: ubuntu-latest
    outputs:
      has-codecov: ${{ steps.codecov-check.outputs.defined }}
    steps:
      - name: Check CODECOV_TOKEN
        id: codecov-check
        shell: bash
        run: |
          if [ "${{ secrets.CODECOV_TOKEN }}" != '' ]; then
            echo "defined=true" >> $GITHUB_OUTPUT
          else
            echo "defined=false" >> $GITHUB_OUTPUT
          fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run lint

  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run format

  test:
    name: Test
    needs: [check-secrets]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run test:coverage

      - name: Upload coverage to Codecov
        if: ${{ !cancelled() && needs.check-secrets.outputs.has-codecov == 'true' }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Codecov skip notice
        if: ${{ !cancelled() && needs.check-secrets.outputs.has-codecov != 'true' }}
        run: echo "::notice::Codecov upload skipped — CODECOV_TOKEN secret is not configured."
