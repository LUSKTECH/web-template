name: Security Scans

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # Weekly on Monday at 06:00 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-secrets:
    name: Check Secrets
    runs-on: ubuntu-latest
    outputs:
      has-snyk: ${{ steps.snyk-check.outputs.defined }}
      has-safety: ${{ steps.safety-check.outputs.defined }}
    steps:
      - name: Check SNYK_TOKEN
        id: snyk-check
        shell: bash
        run: |
          if [ "${{ secrets.SNYK_TOKEN }}" != '' ]; then
            echo "defined=true" >> $GITHUB_OUTPUT
          else
            echo "defined=false" >> $GITHUB_OUTPUT
          fi

      - name: Check SAFETY_API_KEY
        id: safety-check
        shell: bash
        run: |
          if [ "${{ secrets.SAFETY_API_KEY }}" != '' ]; then
            echo "defined=true" >> $GITHUB_OUTPUT
          else
            echo "defined=false" >> $GITHUB_OUTPUT
          fi

  trivy:
    name: Trivy Scan
    if: ${{ vars.TRIVY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.34.1
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: '1'
          format: table

  trivy-skip-notice:
    name: Trivy Skip Notice
    if: ${{ vars.TRIVY_ENABLED != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - run: echo "::notice::Trivy scan skipped — TRIVY_ENABLED variable is not set to 'true'."

  snyk:
    name: Snyk Scan
    needs: [check-secrets]
    if: needs.check-secrets.outputs.has-snyk == 'true'
    runs-on: ubuntu-latest
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run Snyk test
        uses: snyk/actions/node@master
        with:
          args: --severity-threshold=high

  snyk-skip-notice:
    name: Snyk Skip Notice
    needs: [check-secrets]
    if: needs.check-secrets.outputs.has-snyk != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "::notice::Snyk scan skipped — SNYK_TOKEN secret is not configured."

  safety:
    name: Safety CLI Scan
    needs: [check-secrets]
    if: needs.check-secrets.outputs.has-safety == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install safety
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Safety check
        env:
          SAFETY_API_KEY: ${{ secrets.SAFETY_API_KEY }}
        run: safety check --key "$SAFETY_API_KEY" --output screen

  safety-skip-notice:
    name: Safety Skip Notice
    needs: [check-secrets]
    if: needs.check-secrets.outputs.has-safety != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "::notice::Safety CLI scan skipped — SAFETY_API_KEY secret is not configured."
