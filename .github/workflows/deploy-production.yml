name: Deploy Production

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-secrets:
    name: Check Secrets
    runs-on: ubuntu-latest
    outputs:
      has-vercel: ${{ steps.vercel-check.outputs.defined }}
      has-netlify: ${{ steps.netlify-check.outputs.defined }}
    steps:
      - name: Check VERCEL_TOKEN
        id: vercel-check
        shell: bash
        run: |
          if [ "${{ secrets.VERCEL_TOKEN }}" != '' ]; then
            echo "defined=true" >> $GITHUB_OUTPUT
          else
            echo "defined=false" >> $GITHUB_OUTPUT
          fi

      - name: Check NETLIFY_AUTH_TOKEN
        id: netlify-check
        shell: bash
        run: |
          if [ "${{ secrets.NETLIFY_AUTH_TOKEN }}" != '' ]; then
            echo "defined=true" >> $GITHUB_OUTPUT
          else
            echo "defined=false" >> $GITHUB_OUTPUT
          fi

  vercel-production:
    name: Vercel Production Deploy
    needs: [check-secrets]
    if: needs.check-secrets.outputs.has-vercel == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx vitest --run

      - name: Deploy to Vercel (Production)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          github-comment: false

  vercel-skip-notice:
    name: Vercel Skip Notice
    needs: [check-secrets]
    if: needs.check-secrets.outputs.has-vercel != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "::notice::Vercel production deploy skipped — VERCEL_TOKEN secret is not configured."

  netlify-production:
    name: Netlify Production Deploy
    needs: [check-secrets]
    if: needs.check-secrets.outputs.has-netlify == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - run: npx vitest --run

      - name: Deploy to Netlify (Production)
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: ./out
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: 'Production deploy from ${{ github.sha }}'
          enable-pull-request-comment: false
          enable-commit-comment: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

  netlify-skip-notice:
    name: Netlify Skip Notice
    needs: [check-secrets]
    if: needs.check-secrets.outputs.has-netlify != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "::notice::Netlify production deploy skipped — NETLIFY_AUTH_TOKEN secret is not configured."
