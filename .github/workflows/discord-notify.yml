name: Discord Notification

on:
  workflow_run:
    workflows: ['CI', 'Deploy Production']
    types: [completed]

permissions: {}

jobs:
  check-secrets:
    name: Check Secrets
    runs-on: ubuntu-latest
    outputs:
      has-discord: ${{ steps.discord-check.outputs.defined }}
    steps:
      - name: Check DISCORD_WEBHOOK_URL
        id: discord-check
        shell: bash
        run: |
          if [ "${{ secrets.DISCORD_WEBHOOK_URL }}" != '' ]; then
            echo "defined=true" >> $GITHUB_OUTPUT
          else
            echo "defined=false" >> $GITHUB_OUTPUT
          fi

  notify:
    needs: [check-secrets]
    if: needs.check-secrets.outputs.has-discord == 'true'
    uses: LUSKTECH/.github/.github/workflows/discord-notify.yml@main
    with:
      status: ${{ github.event.workflow_run.conclusion }}
      title: '${{ github.event.workflow_run.name }} — ${{ github.event.workflow_run.conclusion }}'
      description: |
        **Repository:** ${{ github.repository }}
        **Branch:** ${{ github.event.workflow_run.head_branch }}
        **Triggered by:** ${{ github.event.workflow_run.actor.login }}
      url: ${{ github.event.workflow_run.html_url }}
    secrets:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}

  notify-skip-notice:
    needs: [check-secrets]
    if: needs.check-secrets.outputs.has-discord != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "::notice::Discord notification skipped — DISCORD_WEBHOOK_URL secret is not configured."
